name: test

on:
  push:
  pull_request:

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: clean fixture passes
        run: ./check_tropes.sh 'tests/good.md'

      - name: dirty fixture is flagged (expected failure)
        run: |
          if ./check_tropes.sh 'tests/bad.md'; then
            echo "::error::tests/bad.md should have been flagged but passed"
            exit 1
          fi
          echo "tests/bad.md correctly flagged"

      - name: action runs as a composite action (regex gate)
        uses: ./
        with:
          paths: "tests/good.md"

      # Exercise the advisory ML path end to end. If no model-latest release is
      # published yet, the action prints a notice and the step still passes
      # (advisory, never blocking) — so this is safe before/after the model exists.
      - name: action runs with ml advisory pass
        uses: ./
        with:
          paths: "tests/good.md"
          ml: true
